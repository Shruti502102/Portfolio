<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Shruti Srivastava — Blog</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Cabinet+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
<style>
:root{--bg:#04040e;--s1:#07071a;--v:#6d28d9;--v2:#8b5cf6;--v3:#c4b5fd;--m:#06d6a0;--g:#f59e0b;--r:#ef4444;--w:#eeeeff;--mu:rgba(238,238,255,.42);--fd:'Clash Display',sans-serif;--fb:'Cabinet Grotesk',sans-serif;--fm:'JetBrains Mono',monospace;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--fb);background:var(--bg);color:var(--w);min-height:100vh;overflow-x:hidden;cursor:none;}
#cd{position:fixed;width:7px;height:7px;background:var(--v3);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);mix-blend-mode:screen;}
#cr{position:fixed;width:34px;height:34px;border:1.5px solid rgba(196,181,253,.4);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width .18s,height .18s;mix-blend-mode:screen;}
#cr.mag{width:56px;height:56px;border-color:var(--m);}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 45% at 10% 18%,rgba(109,40,217,.1) 0%,transparent 55%),radial-gradient(ellipse 45% 35% at 88% 80%,rgba(6,214,160,.07) 0%,transparent 55%);pointer-events:none;z-index:0;}
#prog{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,var(--v),var(--m),var(--g));z-index:9999;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:linear-gradient(var(--v),var(--m));border-radius:3px;}

nav{position:sticky;top:0;z-index:500;padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;background:rgba(4,4,14,.9);backdrop-filter:blur(22px);border-bottom:1px solid rgba(255,255,255,.06);}
.nb{display:flex;align-items:center;gap:7px;color:var(--mu);text-decoration:none;font-size:.82rem;transition:color .2s;}
.nb:hover{color:var(--w);}
.logo{font-family:var(--fd);font-size:1rem;font-weight:700;background:linear-gradient(135deg,var(--v3),var(--m));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-r{display:flex;gap:7px;align-items:center;}
.npill{display:inline-flex;align-items:center;gap:5px;color:var(--mu);text-decoration:none;font-size:.75rem;padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.07);transition:all .2s;cursor:pointer;background:none;font-family:var(--fb);}
.npill:hover{border-color:rgba(139,92,246,.4);color:var(--v3);}
.npill.apill{border-color:rgba(245,158,11,.25);color:rgba(245,158,11,.7);}
.npill.apill:hover{border-color:var(--g);color:var(--g);}

.hero{max-width:860px;margin:0 auto;padding:70px 40px 50px;position:relative;z-index:1;}
.hlbl{font-family:var(--fm);font-size:.68rem;color:var(--v3);letter-spacing:.16em;text-transform:uppercase;margin-bottom:10px;}
.htit{font-family:var(--fd);font-size:clamp(2rem,4vw,3rem);font-weight:700;letter-spacing:-.03em;margin-bottom:12px;}
.htit em{font-style:normal;background:linear-gradient(135deg,var(--v3),var(--m));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hsub{font-size:.92rem;color:var(--mu);max-width:480px;line-height:1.75;}

.filters{max-width:860px;margin:0 auto;padding:0 40px 28px;display:flex;gap:7px;flex-wrap:wrap;position:relative;z-index:1;}
.fb{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);color:var(--mu);border-radius:8px;padding:8px 15px;font-size:.79rem;font-family:var(--fb);cursor:pointer;transition:all .2s;}
.fb.a,.fb:hover{background:rgba(109,40,217,.15);border-color:rgba(139,92,246,.4);color:var(--v3);}

.posts{max-width:860px;margin:0 auto;padding:0 40px 100px;position:relative;z-index:1;display:flex;flex-direction:column;gap:16px;}
.post{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:26px;transition:all .3s;cursor:pointer;position:relative;overflow:hidden;opacity:0;transform:translateX(-16px);animation:postin .5s ease forwards;}
@keyframes postin{to{opacity:1;transform:translateX(0);}}
.post::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;transform:scaleX(0);transform-origin:left;transition:transform .4s;}
.post.ml::before{background:linear-gradient(90deg,var(--v),var(--v2));}
.post.cloud::before{background:linear-gradient(90deg,var(--m),#059669);}
.post.arvr::before{background:linear-gradient(90deg,var(--g),#d97706);}
.post.data::before{background:linear-gradient(90deg,var(--r),#dc2626);}
.post:hover::before{transform:scaleX(1);}
.post:hover{border-color:rgba(139,92,246,.3);background:rgba(109,40,217,.05);transform:translateX(6px);}
.post-meta{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.pcat{font-family:var(--fm);font-size:.63rem;padding:3px 9px;border-radius:5px;}
.ml .pcat{background:rgba(139,92,246,.14);border:1px solid rgba(139,92,246,.25);color:var(--v3);}
.cloud .pcat{background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.22);color:var(--m);}
.arvr .pcat{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.22);color:var(--g);}
.data .pcat{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.22);color:var(--r);}
.pdate{font-family:var(--fm);font-size:.67rem;color:var(--mu);}
.pread{font-family:var(--fm);font-size:.65rem;color:var(--mu);margin-left:auto;}
.ptitle{font-family:var(--fd);font-size:1.05rem;font-weight:700;color:var(--w);margin-bottom:8px;line-height:1.25;}
.pexcerpt{font-size:.85rem;color:var(--mu);line-height:1.72;}
.ptags{display:flex;gap:5px;flex-wrap:wrap;margin-top:13px;}
.ptag{font-family:var(--fm);font-size:.62rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:var(--mu);padding:2px 8px;border-radius:5px;}
.post-admin-del{position:absolute;top:12px;right:14px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);color:var(--r);width:28px;height:28px;border-radius:6px;font-size:.78rem;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .2s;z-index:10;}
.post-admin-del:hover{background:rgba(239,68,68,.28);}
body.admin-mode .post:hover .post-admin-del{display:flex;}

/* ARTICLE MODAL */
#article-modal{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(16px);z-index:700;display:none;align-items:center;justify-content:center;}
#article-modal.open{display:flex;}
.art-box{background:var(--s1);border:1px solid rgba(109,40,217,.3);border-radius:20px;padding:40px;width:92%;max-width:660px;max-height:82vh;overflow-y:auto;animation:mslide .4s ease;position:relative;}
@keyframes mslide{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
.art-box::-webkit-scrollbar{width:4px;}
.art-box::-webkit-scrollbar-thumb{background:var(--v);border-radius:2px;}
.art-close{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--mu);font-size:1.1rem;cursor:pointer;transition:color .2s;}
.art-close:hover{color:var(--w);}
.art-cat{font-family:var(--fm);font-size:.65rem;padding:3px 10px;border-radius:5px;margin-bottom:11px;display:inline-block;}
.art-title{font-family:var(--fd);font-size:1.45rem;font-weight:700;letter-spacing:-.02em;margin-bottom:7px;line-height:1.2;}
.art-meta{font-family:var(--fm);font-size:.69rem;color:var(--mu);margin-bottom:24px;display:flex;align-items:center;gap:8px;}
.art-body{font-size:.9rem;color:var(--mu);line-height:1.86;}
.art-body h3{font-family:var(--fd);font-size:1rem;font-weight:700;color:var(--w);margin:22px 0 9px;}
.art-body p{margin-bottom:13px;}
.art-body code{font-family:var(--fm);font-size:.81rem;background:rgba(109,40,217,.12);border:1px solid rgba(109,40,217,.22);padding:2px 7px;border-radius:5px;color:var(--v3);}
.art-body ul{padding-left:20px;margin-bottom:13px;}
.art-body li{margin-bottom:5px;}

/* FAB */
.fab{position:fixed;bottom:26px;right:26px;display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--v),#4c1d95);color:#fff;border:none;border-radius:12px;padding:11px 20px;font-size:.82rem;font-weight:700;font-family:var(--fb);cursor:pointer;z-index:600;box-shadow:0 8px 28px rgba(109,40,217,.45);transition:all .25s;}
.fab:hover{transform:translateY(-2px);}

/* ADD POST MODAL */
#add-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(14px);z-index:800;display:none;align-items:center;justify-content:center;}
#add-modal.open{display:flex;}
.add-box{background:var(--s1);border:1px solid rgba(109,40,217,.4);border-radius:18px;padding:30px;width:92%;max-width:560px;max-height:88vh;overflow-y:auto;animation:mslide .4s ease;position:relative;}
.add-box::-webkit-scrollbar{width:4px;}
.add-box::-webkit-scrollbar-thumb{background:var(--v);border-radius:2px;}
.am-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--mu);font-size:1.1rem;cursor:pointer;}
.add-box h3{font-family:var(--fd);font-size:1rem;font-weight:700;color:var(--w);margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-family:var(--fm);font-size:.65rem;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;color:var(--w);font-family:var(--fb);font-size:.85rem;outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(139,92,246,.42);}
.fg input::placeholder,.fg textarea::placeholder{color:var(--mu);}
.fg select option{background:var(--s1);}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-p{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--v),#4c1d95);color:#fff;border:none;border-radius:9px;padding:10px 22px;font-size:.84rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--fb);}
.btn-p:hover{transform:translateY(-2px);}

/* CHIBI */
.chibi-wrap{position:fixed;bottom:26px;left:26px;z-index:6000;}
.chibi-fig{width:95px;height:95px;cursor:pointer;filter:drop-shadow(0 0 18px rgba(109,40,217,.5));animation:cbob 4s ease-in-out infinite;}
.chibi-fig img{width:100%;height:100%;object-fit:contain;}
@keyframes cbob{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.chibi-bubble{position:absolute;bottom:108px;left:0;background:rgba(7,7,26,.97);border:1px solid rgba(109,40,217,.42);border-radius:13px 13px 13px 4px;padding:12px 14px;max-width:230px;font-size:.79rem;color:var(--mu);line-height:1.6;display:none;backdrop-filter:blur(16px);}
.chibi-bubble.on{display:block;animation:bpop .3s ease;}
@keyframes bpop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}

/* Login */
#login-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(18px);z-index:9000;display:none;align-items:center;justify-content:center;}
#login-ov.open{display:flex;}
.lbox{background:var(--s1);border:1px solid rgba(109,40,217,.4);border-radius:20px;padding:34px;width:310px;text-align:center;}
.lbox h2{font-family:var(--fd);font-size:1.1rem;font-weight:700;color:var(--w);margin-bottom:5px;}
.lbox p{font-size:.8rem;color:var(--mu);margin-bottom:20px;}
.lbox input{width:100%;padding:12px 15px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--w);font-family:var(--fb);font-size:.9rem;outline:none;margin-bottom:12px;transition:border-color .2s;}
.lbox input:focus{border-color:rgba(139,92,246,.5);}
.lbox input::placeholder{color:var(--mu);}
.lerr{font-size:.76rem;color:var(--r);margin-bottom:7px;display:none;}

.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%)translateY(20px);background:rgba(6,214,160,.14);border:1px solid rgba(6,214,160,.38);color:var(--m);padding:10px 22px;border-radius:10px;font-size:.82rem;z-index:9999;opacity:0;pointer-events:none;transition:all .35s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%)translateY(0);}

@media(max-width:680px){.hero,.filters,.posts{padding-left:18px;padding-right:18px;}.art-box,.add-box{padding:22px;}}
</style>
</head>
<body>
<div id="cd"></div><div id="cr"></div>
<div id="prog"></div>

<nav>
  <a href="index.html" class="nb"><i class="bi bi-arrow-left"></i> Portfolio</a>
  <div class="logo">SS.</div>
  <div class="nav-r">
    <a href="tr.html" class="npill"><i class="bi bi-award"></i> Certs</a>
    <button class="npill apill" onclick="openLogin()"><i class="bi bi-shield-lock"></i> Admin</button>
  </div>
</nav>

<div class="hero">
  <p class="hlbl">Learning in Public</p>
  <h1 class="htit">Tech Notes &amp; <em>Insights</em></h1>
  <p class="hsub">Thoughts on machine learning, cloud, AR/VR and my data science journey. Raw, honest, educational.</p>
</div>

<div class="filters">
  <button class="fb a" onclick="doFilter('all',this)">All Posts</button>
  <button class="fb" onclick="doFilter('ml',this)">Machine Learning</button>
  <button class="fb" onclick="doFilter('cloud',this)">Cloud / Gen AI</button>
  <button class="fb" onclick="doFilter('arvr',this)">AR / VR</button>
  <button class="fb" onclick="doFilter('data',this)">Data Science</button>
</div>

<div class="posts" id="posts"></div>

<button class="fab" onclick="openLogin(true)"><i class="bi bi-plus-lg"></i> Add Post</button>

<!-- CHIBI -->
<div class="chibi-wrap">
  <div class="chibi-bubble" id="cbubb">Click any post to read the full article! 📖</div>
  <div class="chibi-fig" onclick="toggleChibi()"><img src="chibi-ai.png" alt="Shru-AI"/></div>
</div>

<!-- ARTICLE MODAL -->
<div id="article-modal" onclick="if(event.target===this)closeArt()">
  <div class="art-box">
    <button class="art-close" onclick="closeArt()"><i class="bi bi-x-lg"></i></button>
    <div id="art-content"></div>
  </div>
</div>

<!-- ADD POST MODAL -->
<div id="add-modal" onclick="if(event.target===this)closeAdd()">
  <div class="add-box" style="position:relative;">
    <button class="am-close" onclick="closeAdd()"><i class="bi bi-x-lg"></i></button>
    <h3><i class="bi bi-journal-plus"></i> Add Blog Post</h3>
    <div class="fg"><label>Title</label><input type="text" id="nb-title" placeholder="Post title"/></div>
    <div class="fg-row">
      <div class="fg"><label>Category</label>
        <select id="nb-cat">
          <option value="ml">Machine Learning</option>
          <option value="cloud">Cloud / Gen AI</option>
          <option value="arvr">AR / VR</option>
          <option value="data">Data Science</option>
        </select>
      </div>
      <div class="fg"><label>Read Time</label><input type="text" id="nb-time" placeholder="5 min"/></div>
    </div>
    <div class="fg"><label>Excerpt (1-2 lines)</label><textarea id="nb-excerpt" rows="2" placeholder="Short summary for the card…"></textarea></div>
    <div class="fg"><label>Full Content (HTML ok)</label><textarea id="nb-content" rows="7" placeholder="&lt;h3&gt;Section&lt;/h3&gt;&lt;p&gt;Content…&lt;/p&gt;"></textarea></div>
    <div class="fg"><label>Tags (comma separated)</label><input type="text" id="nb-tags" placeholder="Python, ML, API"/></div>
    <br/>
    <button class="btn-p" onclick="addPost()"><i class="bi bi-plus-lg"></i> Publish Post</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login-ov">
  <div class="lbox">
    <h2>🔐 Admin Login</h2>
    <p>Enter password to add / remove posts</p>
    <input type="password" id="pw" placeholder="Password…" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="lerr" id="lerr">Wrong password.</div>
    <button class="btn-p" style="width:100%;justify-content:center;" onclick="doLogin()"><i class="bi bi-shield-check"></i> Login</button>
    <br/><br/>
    <button style="background:none;border:none;color:var(--mu);font-size:.79rem;cursor:pointer;" onclick="document.getElementById('login-ov').classList.remove('open')">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="admin-data.js"></script>
<script>
const cd=document.getElementById('cd'),cr=document.getElementById('cr');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cd.style.left=mx+'px';cd.style.top=my+'px';});
(function lr(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;cr.style.left=rx+'px';cr.style.top=ry+'px';requestAnimationFrame(lr);})();
window.addEventListener('scroll',()=>{const s=window.scrollY,h=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('prog').style.width=(s/h*100)+'%';});

const D=()=>window.SS_DATA;
const SAVE=()=>window.SS_SAVE();
const catLabels={ml:'Machine Learning',cloud:'Cloud / Gen AI',arvr:'AR / VR',data:'Data Science'};

let activeFilter='all',afterLoginCb=null;

function renderPosts(filter){
  activeFilter=filter||activeFilter;
  const g=document.getElementById('posts');
  const posts=D().blogs;
  const visible=activeFilter==='all'?posts:posts.filter(p=>p.cat===activeFilter);
  g.innerHTML=visible.map((p,i)=>`
  <div class="post ${p.cat}" style="animation-delay:${i*.06}s" onclick="openArt(${p.id})">
    <button class="post-admin-del" onclick="event.stopPropagation();delPost(${p.id})"><i class="bi bi-trash"></i></button>
    <div class="post-meta">
      <span class="pcat">${p.catLabel||catLabels[p.cat]||p.cat}</span>
      <span class="pdate">${p.date}</span>
      <span class="pread">${p.readtime} read</span>
    </div>
    <h2 class="ptitle">${p.title}</h2>
    <p class="pexcerpt">${p.excerpt}</p>
    <div class="ptags">${(p.tags||[]).map(t=>`<span class="ptag">${t}</span>`).join('')}</div>
  </div>`).join('');
  document.querySelectorAll('.post,.fab,.npill,.chibi-fig').forEach(el=>{
    el.addEventListener('mouseenter',()=>cr.classList.add('mag'));
    el.addEventListener('mouseleave',()=>cr.classList.remove('mag'));
  });
}

function doFilter(cat,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('a'));
  btn.classList.add('a');renderPosts(cat);
}

function openArt(id){
  const p=D().blogs.find(x=>x.id===id);if(!p)return;
  const catClass=p.cat;
  const catBg={ml:'rgba(139,92,246,.14)',cloud:'rgba(6,214,160,.1)',arvr:'rgba(245,158,11,.1)',data:'rgba(239,68,68,.1)'};
  const catCol={ml:'var(--v3)',cloud:'var(--m)',arvr:'var(--g)',data:'var(--r)'};
  document.getElementById('art-content').innerHTML=`
  <span class="art-cat" style="background:${catBg[catClass]||catBg.ml};color:${catCol[catClass]||catCol.ml};border:1px solid ${catCol[catClass]||catCol.ml}33">${p.catLabel||catLabels[p.cat]}</span>
  <h2 class="art-title">${p.title}</h2>
  <div class="art-meta"><i class="bi bi-calendar3"></i>${p.date} &nbsp;·&nbsp; ${p.readtime} read</div>
  <div class="art-body">${p.content}</div>`;
  document.getElementById('article-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeArt(){document.getElementById('article-modal').classList.remove('open');document.body.style.overflow='';}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}

/* CHIBI */
let co=false,ci=0;
const msgs=["📖 Click any post to read it fully!","🤖 Shruti writes about real projects!","☁️ Gen AI internship insights inside!","🥽 Check the AR/VR performance post!"];
function toggleChibi(){co=!co;const b=document.getElementById('cbubb');if(co){b.textContent=msgs[ci++%msgs.length];b.classList.add('on');}else b.classList.remove('on');}

/* ADMIN */
function openLogin(goAdd=false){afterLoginCb=goAdd?openAdd:null;document.getElementById('login-ov').classList.add('open');setTimeout(()=>document.getElementById('pw').focus(),80);}
function doLogin(){
  const pw=document.getElementById('pw').value;
  if(pw===D().password){
    document.getElementById('login-ov').classList.remove('open');document.getElementById('pw').value='';
    document.getElementById('lerr').style.display='none';
    document.body.classList.add('admin-mode');showToast('✅ Admin mode');renderPosts();
    if(afterLoginCb)afterLoginCb();
  }else{document.getElementById('lerr').style.display='block';}
}
function openAdd(){document.getElementById('add-modal').classList.add('open');}
function closeAdd(){document.getElementById('add-modal').classList.remove('open');}

function addPost(){
  const g=id=>document.getElementById(id)?.value.trim()||'';
  const title=g('nb-title'),cat=g('nb-cat'),time=g('nb-time')||'5 min',excerpt=g('nb-excerpt'),content=g('nb-content'),tags=g('nb-tags').split(',').map(x=>x.trim()).filter(Boolean);
  if(!title){showToast('⚠️ Enter a title');return;}
  const newId=Math.max(0,...D().blogs.map(b=>b.id))+1;
  D().blogs.unshift({id:newId,cat,catLabel:catLabels[cat],title,date:new Date().toLocaleDateString('en-US',{month:'short',year:'numeric'}),readtime:time,excerpt,content,tags});
  SAVE();closeAdd();renderPosts();showToast('✅ Post published!');
  ['nb-title','nb-time','nb-excerpt','nb-content','nb-tags'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}
function delPost(id){if(!confirm('Delete this post?'))return;D().blogs=D().blogs.filter(b=>b.id!==id);SAVE();renderPosts();showToast('🗑 Post removed');}

renderPosts();
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeArt();closeAdd();}});
</script>
</body>
</html>
